<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phil</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem 1rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 400;
    }

    nav {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
      gap: 2rem;
      width: 100%;
      margin-top: 1rem;
    }

    .project-thumb {
      color: inherit;
      text-decoration: none;
    }

    .project-thumb:hover .thumbinner {
      border-color: #a2a9b1;
    }

    .thumb {
      margin: 0;
    }

    .thumbinner {
      border: 1px solid #c8ccd1;
      background: #f8f9fa;
      padding: 3px;
      display: inline-block;
      text-align: center;
      font-size: 94%;
      width: fit-content;
      max-width: 220px;
    }

    .thumbinner:has(.thumbimage img) {
      width: 220px;
    }

    .thumbimage {
      display: block;
      background: #eaecf0;
      line-height: 0;
      overflow: hidden;
    }

    .thumbimage img {
      display: block;
      width: 100%;
      height: auto;
    }

    .thumbimage--emoji {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1;
      background: transparent;
    }

    .thumbimage--emoji .thumb-emoji {
      font-size: 4.5rem;
      line-height: 1;
    }

    .thumbcaption {
      text-align: left;
      padding: 3px;
      line-height: 1.4;
      color: #202122;
    }
  </style>
</head>
<body>
  <header>
    <h1>phil</h1>
    <nav aria-label="Projekte">
      <a href="/home" class="project-thumb">
        <figure class="thumb">
          <div class="thumbinner">
            <span class="thumbimage">
              <img src="/previews/home.webp" alt="" />
            </span>
            <figcaption class="thumbcaption">Home</figcaption>
          </div>
        </figure>
      </a>
      <a href="/archive" class="project-thumb">
        <figure class="thumb">
          <div class="thumbinner">
            <span class="thumbimage thumbimage--emoji" aria-hidden="true">
              <span class="thumb-emoji">📁</span>
            </span>
            <figcaption class="thumbcaption">Archive</figcaption>
          </div>
        </figure>
      </a>
    </nav>
  </header>
</body>
</html>

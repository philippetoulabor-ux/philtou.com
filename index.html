<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phil</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem 1rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 400;
    }

    header .intro {
      max-width: 36rem;
      margin-top: 0.75rem;
      padding: 0 1rem;
      font-size: 1rem;
      line-height: 1.5;
    }

    header .intro a {
      color: #0645AD;
      text-decoration: none;
    }

    header .intro a:hover .wikilink-label {
      text-decoration: underline;
    }

    nav {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
      gap: 2rem;
      width: 100%;
      margin-top: 1rem;
    }

    .project-thumb {
      color: inherit;
      text-decoration: none;
      flex: 0 0 auto;
      width: min(100%, 440px);
    }

    .project-thumb:hover .thumbinner {
      border-color: #a2a9b1;
    }

    .thumb {
      margin: 0;
    }

    .thumbinner {
      border: 1px solid #c8ccd1;
      background: #f8f9fa;
      padding: 3px;
      display: flex;
      flex-direction: column;
      text-align: center;
      font-size: 94%;
      width: 100%;
      min-height: 300px;
    }

    @media (max-width: 520px) {
      nav {
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }

      .thumbinner {
        min-height: min(300px, 68vw);
      }
    }

    .thumbimage {
      display: block;
      flex: 1;
      background: transparent;
      line-height: 0;
      overflow: hidden;
    }

    .thumbimage img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .thumbimage--emoji {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1;
      background: transparent;
    }

    .thumbimage--emoji .thumb-emoji {
      font-size: 4.5rem;
      line-height: 1;
    }

    .thumbcaption {
      text-align: left;
      padding: 3px;
      line-height: 1.4;
      color: #202122;
    }
  </style>
</head>
<body>
  <header>
    <h1>phil</h1>
    <p class="intro">
      Creating, contributing to and shaping <a href="/worlding">[[<span class="wikilink-label">Worlds</span>]]</a><br>
      across disciplines – rooted in a background in product design
    </p>
    <nav aria-label="Projekte">
      <a href="/home" class="project-thumb" target="_blank" rel="noopener noreferrer">
        <figure class="thumb">
          <div class="thumbinner">
            <span class="thumbimage">
              <img src="/previews/home.webp" alt="" />
            </span>
            <figcaption class="thumbcaption">Home</figcaption>
          </div>
        </figure>
      </a>
      <a href="/archive" class="project-thumb" target="_blank" rel="noopener noreferrer">
        <figure class="thumb">
          <div class="thumbinner">
            <span class="thumbimage thumbimage--emoji" aria-hidden="true">
              <span class="thumb-emoji">📁</span>
            </span>
            <figcaption class="thumbcaption">Archive</figcaption>
          </div>
        </figure>
      </a>
      <a href="/ar-archive" class="project-thumb" target="_blank" rel="noopener noreferrer">
        <figure class="thumb">
          <div class="thumbinner">
            <span class="thumbimage thumbimage--emoji" aria-hidden="true">
              <span class="thumb-emoji">📱</span>
            </span>
            <figcaption class="thumbcaption">AR Archive</figcaption>
          </div>
        </figure>
      </a>
    </nav>
  </header>
</body>
</html>

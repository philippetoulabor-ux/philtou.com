<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phil</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 2rem 1rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 400;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1rem;
      font-size: 1rem;
    }

    nav a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.2em;
    }

    nav a:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <header>
    <h1>phil</h1>
    <nav aria-label="Projekte">
      <a href="/home">Home</a>
      <a href="/archive">Archive</a>
    </nav>
  </header>
</body>
</html>
